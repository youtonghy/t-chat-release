name: Build and Release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Private source branch, tag, or commit SHA
        required: true
        type: string
      release_draft:
        description: Create or keep the release as a draft
        required: false
        default: false
        type: boolean
      prerelease:
        description: Mark the release as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_name: ${{ steps.version.outputs.release_name }}
      product_name: ${{ steps.version.outputs.product_name }}
      product_slug: ${{ steps.version.outputs.product_slug }}
      source_sha: ${{ steps.version.outputs.source_sha }}
    steps:
      - name: Checkout orchestrator repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Checkout private source repository
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          fetch-depth: 0
          path: source

      - name: Resolve source version
        id: version
        run: node scripts/resolve-version.mjs --source-dir source --github-output "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            os_key: macos
            arch_key: arm64
            rust_target: aarch64-apple-darwin
          - runner: windows-latest
            os_key: windows
            arch_key: x64
            rust_target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            os_key: windows
            arch_key: arm64
            rust_target: aarch64-pc-windows-msvc
          - runner: ubuntu-22.04
            os_key: linux
            arch_key: x64
            rust_target: x86_64-unknown-linux-gnu
          - runner: ubuntu-22.04-arm
            os_key: linux
            arch_key: arm64
            rust_target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: source
    steps:
      - name: Checkout orchestrator repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Checkout private source repository
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          fetch-depth: 0
          path: source

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: source/src-tauri -> target

      - name: Install Linux build dependencies
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: pnpm tauri build -- --target ${{ matrix.rust_target }}

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os_key }}-${{ matrix.arch_key }}
          path: source/src-tauri/target/${{ matrix.rust_target }}/release/bundle
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout orchestrator repository
        uses: actions/checkout@v5

      - name: Checkout private source repository
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          fetch-depth: 0
          path: source

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Collect release notes
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/collect-release-notes.mjs \
            --source-dir source \
            --source-repo "${{ secrets.PRIVATE_REPO }}" \
            --source-ref "${{ inputs.source_ref }}" \
            --version "${{ needs.prepare.outputs.version }}" \
            --tag-name "${{ needs.prepare.outputs.tag_name }}" \
            --release-name "${{ needs.prepare.outputs.release_name }}" \
            --product-name "${{ needs.prepare.outputs.product_name }}" \
            --product-slug "${{ needs.prepare.outputs.product_slug }}" \
            --output release-context.json

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/publish-release.mjs \
            --context-file release-context.json \
            --artifacts-dir artifacts \
            --draft "${{ inputs.release_draft }}" \
            --prerelease "${{ inputs.prerelease }}"
